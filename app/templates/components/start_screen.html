<div id="game-container">
<div class="landing-page">

    <!-- Floating coffee beans background -->
    <div class="coffee-beans-bg" aria-hidden="true">
        <span class="bean" style="--x: 8%; --delay: 0s;">☕</span>
        <span class="bean" style="--x: 22%; --delay: 1.4s;">✦</span>
        <span class="bean" style="--x: 40%; --delay: 0.6s;">☕</span>
        <span class="bean" style="--x: 58%; --delay: 2s;">✦</span>
        <span class="bean" style="--x: 75%; --delay: 0.9s;">☕</span>
        <span class="bean" style="--x: 90%; --delay: 1.7s;">✦</span>
    </div>

    <div class="landing-content">
        <!-- Hero coffee cup -->
        <div class="landing-cup">
            <div class="landing-steam"></div>
            <div class="landing-steam" style="animation-delay: 0.6s; left: 58%;"></div>
            <div class="landing-steam" style="animation-delay: 1.2s; left: 36%;"></div>
            <div class="landing-mug">
                <div class="landing-mug-liquid"></div>
                <div class="landing-mug-heart"></div>
            </div>
            <div class="landing-mug-handle"></div>
        </div>

        <!-- Title -->
        <h1 class="landing-title cozy-heading">Soc Ops</h1>
        <p class="landing-subtitle">Social Bingo for Real Connections</p>

        <!-- How to play steps -->
        <div class="landing-steps">
            <div class="landing-step" style="animation-delay: 0.3s;">
                <span class="landing-step-icon">🔍</span>
                <span>Mingle &amp; find people who match</span>
            </div>
            <div class="landing-step" style="animation-delay: 0.5s;">
                <span class="landing-step-icon">📌</span>
                <span>Tap squares as you discover matches</span>
            </div>
            <div class="landing-step" style="animation-delay: 0.7s;">
                <span class="landing-step-icon">☕</span>
                <span>Get 5 in a row — earn your latte!</span>
            </div>
        </div>

        <!-- CTA -->
        <button
            hx-post="/start"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="landing-cta cozy-heading">
            Start Game
        </button>

        <p class="landing-footer">Best enjoyed with friends &amp; coffee</p>
    </div>
</div>
</div>
