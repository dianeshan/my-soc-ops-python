<div id="game-container">
<div class="landing-page flex flex-col items-center justify-center min-h-full p-6 bg-gray-50 animate-fade-in">
    <div class="text-center max-w-sm">
        <div class="mb-2" style="font-size: 3rem;">☕</div>
        <h1 class="text-4xl font-bold text-gray-900 mb-2 cozy-heading">Soc Ops</h1>
        <p class="text-lg text-gray-600 mb-8" style="font-style: italic;">Social Bingo</p>

        <div class="cozy-card p-6 mb-8">
            <h2 class="font-semibold text-gray-800 mb-3 cozy-heading text-lg">How to play</h2>
            <ul class="text-left text-gray-600 text-sm space-y-2">
                <li>☕ Find people who match the questions</li>
                <li>📌 Tap a square when you find a match</li>
                <li>🎉 Get 5 in a row to win!</li>
            </ul>
        </div>

        <button
            hx-post="/start"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="w-full btn-cozy py-4 px-8 text-lg cozy-heading">
            Start Game
        </button>
    </div>
</div>
</div>
