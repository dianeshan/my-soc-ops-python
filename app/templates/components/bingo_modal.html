<div class="fixed inset-0 modal-overlay flex items-center justify-center p-4 z-50">
    <div class="modal-card p-6 max-w-xs w-full text-center">
        <!-- CSS Coffee Cup with Latte Art -->
        <div class="coffee-scene">
            <!-- Steam -->
            <div class="steam"></div>
            <div class="steam"></div>
            <div class="steam"></div>
            <!-- Cup -->
            <div class="coffee-cup">
                <div class="latte-art">
                    <div class="latte-leaf"></div>
                    <div class="latte-leaf"></div>
                    <div class="latte-leaf"></div>
                    <div class="latte-leaf"></div>
                    <div class="latte-leaf"></div>
                    <div class="latte-leaf"></div>
                    <div class="latte-leaf"></div>
                    <div class="latte-leaf"></div>
                </div>
            </div>
            <div class="coffee-handle"></div>
            <div class="coffee-saucer"></div>
        </div>

        <h2 class="text-3xl font-bold cozy-heading mb-2" style="color: var(--mustard-dark); text-shadow: 0 0 10px rgba(255, 217, 61, 0.35);">BINGO!</h2>
        <p class="text-gray-600 mb-6" style="font-style: italic; color: var(--espresso-mid);">You completed a line! Enjoy your coffee ☕</p>

        <button
            hx-post="/dismiss-modal"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="w-full btn-cozy py-3 px-6 cozy-heading text-lg">
            Keep Playing
        </button>
    </div>
</div>
